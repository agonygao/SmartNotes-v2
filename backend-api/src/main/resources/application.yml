server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartnotes?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${SMARTNOTES_JWT_SECRET:placeholderMustChange}
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000
  encryption:
    key: ${SMARTNOTES_ENCRYPTION_KEY:placeholderMustChange}

file:
  upload-dir: ./uploads

logging:
  level:
    com.smartnotes: DEBUG
    org.springframework.security: DEBUG
