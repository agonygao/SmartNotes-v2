    secret: dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi13aXRoLWVuY29kaW5nLTI1Ni1iaXRz
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000
  encryption:
    key: YWFiYmNjZGRlZWZmMDAxMTIyMzM0NDU1NjY3Nzg4OTk=

file:
  upload-dir: ./test-uploads

logging:
  level:
    com.smartnotes: DEBUG
